services:
  ai_service:
    build:
      context: ./ai_service
    environment:
      - USE_LLM=0
      - PORT=8000
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ./gateway
    environment:
      - AI_SERVICE_URL=http://ai_service:8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=gateway
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/logs:/app/logs
    depends_on:
      - ai_service
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.59
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
