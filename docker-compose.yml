services:
  ai_service:
    build:
      context: ./ai_service
    environment:
      - USE_LLM=0
      - PORT=8000
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ./gateway
    environment:
      - AI_SERVICE_URL=http://ai_service:8000
    ports:
      - "8080:8080"
    depends_on:
      - ai_service
